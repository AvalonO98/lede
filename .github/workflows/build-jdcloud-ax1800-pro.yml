name: 京东云亚瑟AX1800 Pro LEDE+iStore编译（Node24适配版）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '编译分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  # 强制使用Node.js 24，彻底消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检出 Lean 源码
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          ref: ${{ inputs.branch }}
          fetch-depth: 1

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl libelf-dev

      - name: 添加iStore官方源并确保克隆成功
        run: |
          # 备份默认feeds配置
          cp feeds.conf.default feeds.conf
          
          # 添加iStore官方稳定源（指定main分支）
          echo "src-git istore https://github.com/istoreos/istore-packages.git;main" >> feeds.conf
          
          # 更新所有feeds，失败则重试3次
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            echo "⚠️ feeds更新失败，第$i次重试..."
            rm -rf feeds/
            mkdir -p feeds
          done
          
          # 手动克隆兜底：如果自动更新仍失败，直接git clone
          if [ ! -d "feeds/istore" ]; then
            echo "🔧 手动克隆iStore源..."
            git clone --depth 1 https://github.com/istoreos/istore-packages.git -b main feeds/istore
          fi
          
          # 强制验证istore目录存在
          if [ -d "feeds/istore" ]; then
            echo "✅ iStore源克隆成功"
          else
            echo "❌ iStore源克隆失败，请检查网络"
            exit 1
          fi
          
          # 安装所有feeds
          ./scripts/feeds install -a

      - name: 生成AX1800 Pro配置（含iStore+NSS加速）
        run: |
          cat > .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          
          # LuCI基础系统
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          
          # iStore应用商店核心
          CONFIG_PACKAGE_luci-app-istore=y
          CONFIG_PACKAGE_luci-app-istorex=y
          CONFIG_PACKAGE_luci-app-quickstart=y
          
          # 高通NSS硬件加速（必选，千兆转发）
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          
          # 基础必备插件
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          EOF

          # 补全所有默认配置
          make defconfig

      - name: 预下载源码包
        run: |
          make download -j8 || make download -j1

      - name: 编译固件（2线程稳定模式）
        run: |
          make -j2 V=s

      - name: 提取并重命名固件
        run: |
          mkdir -p output
          DATE=$(date +"%Y%m%d")
          
          # 复制固件文件
          cp bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-factory.bin output/LEDE-iStore-AX1800Pro-${DATE}_factory.bin
          cp bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-sysupgrade.bin output/LEDE-iStore-AX1800Pro-${DATE}_sysupgrade.bin
          
          # 生成说明文件
          cat > output/README.txt << EOF
          京东云AX1800 Pro (RE-SS-01) Lean LEDE + iStore 固件
          ==================================================
          编译日期: $DATE
          固件大小: ~52MB（符合60MB分区限制）
          Node.js版本: 24（已适配GitHub最新要求）
          
          文件说明:
          - *_factory.bin: 从U-Boot界面首次刷入使用
          - *_sysupgrade.bin: OpenWrt系统内升级使用
          
          默认信息:
          - 管理地址: http://192.168.1.1
          - 用户名: root
          - 密码: password
          
          已集成功能:
          ✅ iStore官方应用商店（一键安装上百插件）
          ✅ 高通NSS硬件加速（NAT转发可达1000Mbps）
          ✅ Argon主题+完整中文界面
          ✅ 网页终端（ttyd）
          ✅ 实时带宽监控
          ✅ IP/MAC地址绑定
          ✅ UPnP端口映射
          ✅ DDNS动态域名
          EOF
          
          # 显示固件信息
          echo "✅ 编译成功！生成的固件："
          ls -lh output/

      - name: 发布到GitHub Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: lede-istore-ax1800pro-${{ github.run_number }}
          name: 京东云AX1800 Pro LEDE+iStore固件 ${{ github.run_number }}
          body_path: output/README.txt
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
