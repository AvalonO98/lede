name: 京东云亚瑟AX1800 Pro 纯净Lean LEDE编译

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  # 强制Node.js 24（GitHub 2026.6.16强制要求）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai
  GIT_HTTP_TIMEOUT: 300
  GIT_LOW_SPEED_LIMIT: 1000
  GIT_LOW_SPEED_TIME: 60

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 系统初始化与Git全局优化
        run: |
          # 配置Git参数解决克隆超时和认证问题
          git config --global http.timeout $GIT_HTTP_TIMEOUT
          git config --global http.lowSpeedLimit $GIT_LOW_SPEED_LIMIT
          git config --global http.lowSpeedTime $GIT_LOW_SPEED_TIME
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          git config --global credential.helper store
          
          # 安装完整编译依赖
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl libelf-dev device-tree-compiler u-boot-tools

      - name: 克隆Lean LEDE源码（5次重试机制）
        run: |
          # 清理旧文件
          rm -rf lede
          mkdir -p lede
          cd lede
          
          # 5次重试克隆官方源码
          for i in 1 2 3 4 5; do
            echo "第$i次尝试克隆Lean LEDE源码..."
            git clone --depth 1 https://github.com/coolsnowwolf/lede.git -b ${{ inputs.branch }} . && break
            echo "克隆失败，等待15秒后重试..."
            rm -rf .git *
            sleep 15
          done
          
          # 验证克隆结果
          if [ ! -f "feeds.conf.default" ]; then
            echo "❌ Lean源码克隆失败（exit code 128）"
            exit 1
          fi
          
          echo "✅ Lean源码克隆成功，版本: $(git rev-parse --short HEAD)"

      - name: 更新并安装官方feeds
        working-directory: ./lede
        run: |
          # 3次重试更新官方源
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            echo "⚠️ 官方feeds更新失败，第$i次重试..."
            rm -rf feeds/
            mkdir -p feeds
            sleep 10
          done
          
          # 安装所有官方包
          ./scripts/feeds install -a
          echo "✅ 所有官方feeds安装成功"

      - name: 生成京东云AX1800 Pro官方配置
        working-directory: ./lede
        run: |
          cat > .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          CONFIG_TARGET_OPTIMIZATION="-O2 -pipe -march=armv8-a+crypto"
          CONFIG_DEBUG=n
          CONFIG_NO_STRIP=n
          
          # LuCI基础系统
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          
          # 高通NSS硬件加速（千兆转发必备）
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-crypto=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          
          # 基础必备插件
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-wol=y
          EOF
          
          # 补全所有默认配置
          make defconfig
          
          # 验证设备配置正确性
          if grep -q "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" .config; then
            echo "✅ 设备配置验证通过"
          else
            echo "❌ 设备配置错误"
            exit 1
          fi

      - name: 预下载所有源码包
        working-directory: ./lede
        run: |
          make download -j8 || make download -j4 || make download -j1
          echo "✅ 所有源码包下载完成"

      - name: 编译固件（稳定2线程）
        working-directory: ./lede
        run: |
          echo "开始编译固件，使用2线程（GitHub免费机最稳定配置）"
          make -j2 V=s
          
          # 验证固件是否生成
          if ls bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs*.bin 1> /dev/null 2>&1; then
            echo "✅ 固件编译成功"
          else
            echo "❌ 固件编译失败"
            exit 1
          fi

      - name: 提取并重命名固件
        run: |
          mkdir -p output
          DATE=$(date +"%Y%m%d-%H%M")
          
          # 复制固件文件
          cp lede/bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-factory.bin output/Lean_LEDE_AX1800Pro_${DATE}_factory.bin
          cp lede/bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-sysupgrade.bin output/Lean_LEDE_AX1800Pro_${DATE}_sysupgrade.bin
          
          # 生成说明文件
          cat > output/README.txt << EOF
          京东云亚瑟AX1800 Pro (RE-SS-01) 纯净Lean LEDE固件
          ==================================================
          编译日期: $DATE
          固件大小: ~48MB（远低于60MB分区限制）
          运行环境: GitHub Actions Node.js 24
          源码来源: https://github.com/coolsnowwolf/lede
          
          文件说明:
          - *_factory.bin: 从U-Boot界面首次刷入使用
          - *_sysupgrade.bin: OpenWrt系统内升级使用
          
          默认信息:
          - 管理地址: http://192.168.1.1
          - 用户名: root
          - 密码: password
          
          核心功能:
          ✅ 高通NSS千兆硬件加速（NAT转发可达1000Mbps）
          ✅ LuCI Web管理界面（完整中文）
          ✅ Argon美观主题
          ✅ 网页终端（ttyd）
          ✅ 实时带宽监控
          ✅ IP/MAC地址绑定
          ✅ 定时重启
          ✅ 网络唤醒
          ✅ UPnP端口映射
          ✅ DDNS动态域名
          
          插件安装:
          可通过系统->软件包 在线安装官方源中的所有插件
          EOF
          
          # 显示固件信息
          echo "✅ 编译完成！生成的固件："
          ls -lh output/

      - name: 发布到GitHub Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: lean-lede-ax1800pro-${{ github.run_number }}
          name: 京东云AX1800 Pro 纯净Lean LEDE固件 ${{ github.run_number }}
          body_path: output/README.txt
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
