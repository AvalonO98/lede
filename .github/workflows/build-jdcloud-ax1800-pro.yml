name: 京东云亚瑟AX1800 Pro LEDE编译（USB网卡+短信）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 系统初始化与依赖安装
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y || true
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev device-tree-compiler u-boot-tools bc pciutils lm-sensors || true
          
          for cmd in git make gcc g++ flex bison; do
            if ! command -v $cmd &> /dev/null; then
              echo "❌ 关键依赖 $cmd 安装失败"
              exit 1
            fi
          done
          
          git config --global http.timeout 300
          git config --global http.postBuffer 524288000
          git config --global core.askpass ""
          git config --global credential.helper "store --file=/dev/null"

      - name: 克隆Lean LEDE源码
        run: |
          for i in 1 2 3 4 5; do
            echo "第$i次尝试克隆Lean源码..."
            git clone --depth 1 https://github.com/coolsnowwolf/lede.git -b ${{ inputs.branch }} lede && break
            rm -rf lede
            sleep 15
          done
          
          if [ ! -d "lede" ]; then
            echo "❌ Lean源码克隆失败"
            exit 1
          fi
          echo "✅ Lean源码克隆成功"

      - name: 添加短信工具源并更新feeds
        working-directory: ./lede
        run: |
          echo "src-git smstool https://github.com/dwj0/luci-app-sms-tool.git" >> feeds.conf.default
          ./scripts/feeds update -a 2>&1 | tee feeds_update.log
          ./scripts/feeds install -a 2>&1 | tee feeds_install.log
          echo "✅ 所有feeds安装完成"

      - name: 生成京东云AX1800 Pro配置
        working-directory: ./lede
        run: |
          # 1. 初始 defconfig
          make defconfig 2>&1 | tee defconfig1.log
          
          # 2. 强制写入设备目标
          sed -i '/^CONFIG_TARGET_/d' .config
          cat >> .config << EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq60xx=y
          CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-ss-01=y
          EOF
          
          make defconfig 2>&1 | tee defconfig2.log
          
          # 3. 添加需要的软件包
          cat >> .config << EOF
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_usb-modeswitch=y
          
          CONFIG_PACKAGE_modemmanager=y
          CONFIG_PACKAGE_luci-proto-modemmanager=y
          CONFIG_PACKAGE_luci-app-sms-tool=y
          EOF
          
          # 4. 最终 defconfig 解析依赖
          make defconfig 2>&1 | tee defconfig_final.log
          
          # ---------- 彻底禁用 DRM 内核模块（修改内核配置文件）----------
          echo "🔧 修改内核配置文件，彻底禁用 DRM ..."
          KCONFIG=$(ls target/linux/qualcommax/config-* 2>/dev/null | head -1)
          if [ -n "$KCONFIG" ]; then
            # 删除可能存在的 DRM 相关配置行
            sed -i '/^CONFIG_DRM/d' "$KCONFIG"
            sed -i '/^# CONFIG_DRM/d' "$KCONFIG"
            # 追加禁用选项
            cat >> "$KCONFIG" << EOF
          # CONFIG_DRM is not set
          # CONFIG_DRM_BRIDGE is not set
          # CONFIG_DRM_AUX_BRIDGE is not set
          EOF
            echo "✅ 已修改 $KCONFIG"
          else
            echo "⚠️ 未找到内核配置文件，跳过"
          fi
          
          # 同时在 .config 中也禁用，确保双重保险
          sed -i '/^CONFIG_DRM/d' .config
          sed -i '/^# CONFIG_DRM/d' .config
          cat >> .config << EOF
          # CONFIG_DRM is not set
          # CONFIG_DRM_BRIDGE is not set
          # CONFIG_DRM_AUX_BRIDGE is not set
          EOF
          # ---------------------------------------------------------------
          
          # 重新生成配置，确保内核配置变更被引入
          make defconfig 2>&1 | tee defconfig_drm.log
          
          # 验证设备配置是否存在
          if grep -q "CONFIG_TARGET_qualcommax_ipq60xx_DEVICE_jdcloud_re-ss-01=y" .config; then
            echo "✅ 设备配置验证通过"
          else
            echo "❌ 设备配置丢失，当前设备项："
            grep -E 'CONFIG_TARGET_.*DEVICE' .config || echo "无设备定义"
            exit 1
          fi

      - name: 预下载源码包
        working-directory: ./lede
        run: |
          make download -j8 2>&1 | tee download.log || make download -j4 2>&1 | tee -a download.log || make download -j1 2>&1 | tee -a download.log
          echo "✅ 所有源码包下载完成"

      - name: 编译固件（增强内存 + 容错）
        working-directory: ./lede
        run: |
          sudo fallocate -l 2G /swapfile || true
          sudo chmod 600 /swapfile || true
          sudo mkswap /swapfile || true
          sudo swapon /swapfile || true
          echo "✅ Swap 已启用"
          
          echo "🔄 开始单线程编译..."
          make -j1 V=s 2>&1 | tee compile.log
          
          if ls bin/targets/qualcommax/ipq60xx/*jdcloud_re-ss-01*squashfs*.bin 1> /dev/null 2>&1; then
            echo "✅ 固件编译成功"
          else
            echo "⚠️ 单线程编译未生成固件，尝试双线程编译..."
            make -j2 V=s 2>&1 | tee -a compile.log
            if ls bin/targets/qualcommax/ipq60xx/*jdcloud_re-ss-01*squashfs*.bin 1> /dev/null 2>&1; then
              echo "✅ 双线程编译成功"
            else
              echo "❌ 固件编译失败，请查看日志尾部："
              tail -n 100 compile.log
              exit 1
            fi
          fi

      - name: 上传编译日志（总是执行）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            lede/compile.log
            lede/*.log

      - name: 提取固件到 output 目录
        if: success()
        run: |
          mkdir -p output
          DATE=$(date +"%Y%m%d-%H%M")
          
          cp lede/bin/targets/qualcommax/ipq60xx/*jdcloud_re-ss-01*squashfs-factory.bin output/LEDE-AX1800Pro-${DATE}_factory.bin
          cp lede/bin/targets/qualcommax/ipq60xx/*jdcloud_re-ss-01*squashfs-sysupgrade.bin output/LEDE-AX1800Pro-${DATE}_sysupgrade.bin
          
          echo "✅ 固件已提取到 output 目录"
          ls -lh output/

      - name: 发布到 GitHub Releases（使用 gh 命令）
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="ax1800pro-${{ github.run_number }}"
          echo "🚀 创建 Release: $TAG"
          
          # 如果该 tag 已存在，先删除
          gh release view "$TAG" > /dev/null 2>&1 && {
            echo "⚠️ 已存在同名 Release，正在删除..."
            gh release delete "$TAG" --yes || true
          }
          
          # 创建新 Release
          gh release create "$TAG" \
            output/* \
            --title "京东云AX1800 Pro LEDE固件 ${{ github.run_number }}" \
            --notes "自动编译生成，包含 USB 网卡支持和短信功能。
          
          - 设备: jdcloud_re-ss-01
          - 分支: ${{ inputs.branch }}
          - 编译时间: $(date '+%Y-%m-%d %H:%M:%S')"
          
          echo "✅ 固件发布成功"
