name: 京东云亚瑟AX1800 Pro LEDE+iStore编译（终极稳定版）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 系统初始化与依赖安装
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y || true
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev device-tree-compiler u-boot-tools bc pciutils lm-sensors || true
          
          for cmd in git make gcc g++ flex bison; do
            if ! command -v $cmd &> /dev/null; then
              echo "❌ 关键依赖 $cmd 安装失败"
              exit 1
            fi
          done
          
          git config --global http.timeout 300
          git config --global http.postBuffer 524288000
          git config --global core.askpass ""
          git config --global credential.helper "store --file=/dev/null"

      - name: 克隆Lean LEDE源码
        run: |
          for i in 1 2 3 4 5; do
            echo "第$i次尝试克隆Lean源码..."
            git clone --depth 1 https://github.com/coolsnowwolf/lede.git -b ${{ inputs.branch }} lede && break
            rm -rf lede
            sleep 15
          done
          
          if [ ! -d "lede" ]; then
            echo "❌ Lean源码克隆失败"
            exit 1
          fi
          echo "✅ Lean源码克隆成功"

      - name: 克隆iStore并删除冲突包
        working-directory: ./lede
        run: |
          rm -rf feeds/ feeds.conf
          mkdir -p feeds/
          
          REPO_URLS=(
            "https://github.com/istoreos/istore.git"
            "https://github.com/linkease/istore.git"
            "https://github.com/linkease/istore-packages.git"
          )
          
          CLONE_SUCCESS=0
          for repo in "${REPO_URLS[@]}"; do
            echo "🔍 测试连通性: $repo"
            if git ls-remote --heads "$repo" &>/dev/null; then
              echo "✅ 仓库可达，开始克隆: $repo"
            else
              echo "⚠️ 仓库不可达，尝试下一个..."
              continue
            fi
            
            for i in 1 2 3 4 5; do
              echo "第${i}次尝试克隆 $repo ..."
              rm -rf feeds/istore
              git clone --depth 1 "$repo" -b main feeds/istore && {
                CLONE_SUCCESS=1
                break
              }
              echo "❌ 克隆失败，等待30秒后重试..."
              rm -rf feeds/istore
              sleep 30
            done
            
            if [ $CLONE_SUCCESS -eq 1 ]; then
              echo "✅ iStore源克隆成功 (来自: $repo)"
              break
            fi
          done
          
          if [ $CLONE_SUCCESS -ne 1 ]; then
            echo "❌ 所有iStore源均克隆失败"
            exit 1
          fi
          
          # 物理删除冲突包，彻底解决多源同名问题
          echo "🧹 清理冲突包..."
          rm -rf feeds/istore/luci/applications/luci-app-passwall
          rm -rf feeds/istore/luci/applications/luci-app-passwall2
          rm -rf feeds/istore/luci/applications/luci-app-ssr-plus
          
          cat > feeds.conf << EOF
          src-git packages https://github.com/coolsnowwolf/packages
          src-git luci https://github.com/coolsnowwolf/luci
          src-git routing https://github.com/coolsnowwolf/routing
          src-git telephony https://github.com/coolsnowwolf/telephony
          src-link istore feeds/istore
          EOF
          echo "✅ feeds.conf生成，冲突包已删除"

      - name: 更新并安装所有feeds
        working-directory: ./lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✅ 所有feeds安装成功"

      - name: 检测京东云亚瑟设备名称
        working-directory: ./lede
        id: detect_device
        run: |
          # 从源码中自动提取正确的设备定义名
          DEVICE_NAME=$(grep -rPo 'define Device/\K(jdcloud[^ ]*)' target/linux/ipq60xx/image/ | head -1)
          if [ -z "$DEVICE_NAME" ]; then
            echo "❌ 未找到京东云设备定义，请检查源码"
            grep -i jdcloud target/linux/ipq60xx/image/ || true
            exit 1
          fi
          echo "🔧 检测到设备名称: $DEVICE_NAME"
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_OUTPUT

      - name: 生成京东云AX1800 Pro配置
        working-directory: ./lede
        run: |
          DEVICE_NAME="${{ steps.detect_device.outputs.DEVICE_NAME }}"
          
          # 1. 直接使用 make defconfig 根据设备名生成初始配置
          #    需要将设备名转换为完整配置三行
          TARGET_ARCH="ipq60xx"
          TARGET_SUBTARGET="generic"
          
          cat > .config << EOF
          CONFIG_TARGET_${TARGET_ARCH}=y
          CONFIG_TARGET_${TARGET_ARCH}_${TARGET_SUBTARGET}=y
          CONFIG_TARGET_${TARGET_ARCH}_${TARGET_SUBTARGET}_DEVICE_${DEVICE_NAME}=y
          EOF
          
          # 2. 生成该设备的默认配置（自动补全该设备的所有默认包）
          make defconfig
          
          # 3. 使用 ./scripts/config 安全启用所需软件包
          ./scripts/config -e CONFIG_TARGET_ROOTFS_SQUASHFS
          ./scripts/config -e CONFIG_STRIP_KERNEL_EXPORTS
          ./scripts/config -e CONFIG_USE_MKLIBS
          
          ./scripts/config -e CONFIG_PACKAGE_luci
          ./scripts/config -e CONFIG_PACKAGE_luci-i18n-base-zh-cn
          ./scripts/config -e CONFIG_PACKAGE_luci-theme-argon
          
          ./scripts/config -e CONFIG_PACKAGE_luci-app-istore
          ./scripts/config -e CONFIG_PACKAGE_luci-app-istorex
          ./scripts/config -e CONFIG_PACKAGE_luci-app-quickstart
          
          ./scripts/config -e CONFIG_PACKAGE_kmod-qca-nss-drv
          ./scripts/config -e CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc
          ./scripts/config -e CONFIG_PACKAGE_kmod-qca-nss-ecm
          ./scripts/config -e CONFIG_PACKAGE_luci-app-turboacc
          
          ./scripts/config -e CONFIG_PACKAGE_luci-app-upnp
          ./scripts/config -e CONFIG_PACKAGE_luci-app-ddns
          ./scripts/config -e CONFIG_PACKAGE_luci-app-ttyd
          ./scripts/config -e CONFIG_PACKAGE_luci-app-nlbwmon
          ./scripts/config -e CONFIG_PACKAGE_luci-app-arpbind
          
          # 4. 用 yes 自动回车补全所有依赖（完全非交互，不会卡住）
          echo "🔄 正在补全配置依赖（非交互模式）..."
          yes '' | make oldconfig
          
          # 5. 验证设备配置是否被保留
          if grep -q "CONFIG_TARGET_${TARGET_ARCH}_${TARGET_SUBTARGET}_DEVICE_${DEVICE_NAME}=y" .config; then
            echo "✅ 设备配置验证通过 (${DEVICE_NAME})"
          else
            echo "❌ 设备配置丢失，当前配置文件中的设备相关项:"
            grep -E 'CONFIG_TARGET_.*DEVICE' .config || echo "无任何设备选项"
            exit 1
          fi

      - name: 预下载源码包
        working-directory: ./lede
        run: |
          make download -j8 || make download -j4 || make download -j1
          echo "✅ 所有源码包下载完成"

      - name: 编译固件
        working-directory: ./lede
        run: |
          make -j2 V=s
          
          if ls bin/targets/ipq60xx/generic/*jdcloud*squashfs*.bin 1> /dev/null 2>&1; then
            echo "✅ 固件编译成功"
          else
            echo "❌ 固件编译失败"
            exit 1
          fi

      - name: 提取并重命名固件
        run: |
          mkdir -p output
          DATE=$(date +"%Y%m%d-%H%M")
          
          cp lede/bin/targets/ipq60xx/generic/*jdcloud*squashfs-factory.bin output/LEDE-iStore-AX1800Pro-${DATE}_factory.bin
          cp lede/bin/targets/ipq60xx/generic/*jdcloud*squashfs-sysupgrade.bin output/LEDE-iStore-AX1800Pro-${DATE}_sysupgrade.bin
          
          echo "✅ 编译完成！生成的固件："
          ls -lh output/

      - name: 发布到GitHub Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ax1800pro-${{ github.run_number }}
          name: 京东云AX1800 Pro LEDE+iStore固件 ${{ github.run_number }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
