name: 京东云亚瑟AX1800 Pro LEDE+iStore编译（无Passwall版）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai
  GH_PROXY: https://ghproxy.net/

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 系统初始化与依赖安装
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl libelf-dev device-tree-compiler u-boot-tools
          
          git config --global http.timeout 300
          git config --global http.postBuffer 524288000

      - name: 克隆Lean LEDE源码（GH代理）
        run: |
          git clone --depth 1 ${GH_PROXY}https://github.com/coolsnowwolf/lede.git -b ${{ inputs.branch }} lede
          echo "✅ Lean源码克隆成功"

      - name: 添加iStore源并清理冲突包
        working-directory: ./lede
        run: |
          # 添加iStore官方源（走GH代理）
          echo "src-git istore ${GH_PROXY}https://github.com/istoreos/istore-packages.git;main" >> feeds.conf.default
          
          # 更新并安装feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # ==============================================
          # 关键修复：删除有依赖问题的Passwall包
          # ==============================================
          rm -rf feeds/luci/applications/luci-app-passwall
          echo "✅ 已删除冲突的luci-app-passwall包"
          
          # 再次安装feeds确保没有残留
          ./scripts/feeds install -a

      - name: 生成京东云AX1800 Pro配置
        working-directory: ./lede
        run: |
          cat > .config << 'EOF'
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          
          # LuCI基础
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          
          # iStore应用商店核心
          CONFIG_PACKAGE_luci-app-istore=y
          CONFIG_PACKAGE_luci-app-istorex=y
          CONFIG_PACKAGE_luci-app-quickstart=y
          
          # NSS硬件加速
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          
          # 基础插件
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          EOF
          
          # 补全默认配置
          make defconfig
          
          # 强制验证设备配置（防止被覆盖）
          if grep -q "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" .config; then
            echo "✅ 设备配置验证通过"
          else
            echo "❌ 设备配置错误，显示.config内容:"
            cat .config | grep -E "CONFIG_TARGET_ipq60xx|DEVICE_jdcloud"
            exit 1
          fi

      - name: 预下载源码包
        working-directory: ./lede
        run: |
          make download -j8 || make download -j1
          echo "✅ 所有源码包下载完成"

      - name: 编译固件
        working-directory: ./lede
        run: |
          make -j2 V=s
          
          # 验证固件生成
          if ls bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs*.bin 1> /dev/null 2>&1; then
            echo "✅ 固件编译成功"
          else
            echo "❌ 固件编译失败"
            exit 1
          fi

      - name: 提取并重命名固件
        run: |
          mkdir -p output
          DATE=$(date +"%Y%m%d-%H%M")
          
          cp lede/bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-factory.bin output/LEDE-iStore-AX1800Pro-${DATE}_factory.bin
          cp lede/bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-sysupgrade.bin output/LEDE-iStore-AX1800Pro-${DATE}_sysupgrade.bin
          
          cat > output/README.txt << EOF
          京东云亚瑟AX1800 Pro (RE-SS-01) 稳定固件
          编译日期: $DATE
          固件大小: ~52MB
          核心功能: iStore应用商店 + NSS千兆加速
          
          文件说明:
          - *_factory.bin: U-Boot首次刷入
          - *_sysupgrade.bin: 系统内升级
          
          默认信息:
          - 管理地址: http://192.168.1.1
          - 用户名: root
          - 密码: password
          EOF
          
          ls -lh output/

      - name: 发布到Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: lede-istore-ax1800pro-${{ github.run_number }}
          name: 京东云AX1800 Pro LEDE+iStore固件 ${{ github.run_number }}
          body_path: output/README.txt
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
