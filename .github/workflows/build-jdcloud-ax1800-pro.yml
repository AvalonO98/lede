name: 编译京东云亚瑟AX1800 Pro iStoreOS固件(修复webd错误)

on:
  # 手动触发编译
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master
      build_type:
        description: '编译类型'
        required: true
        default: 'minimal'
        type: choice
        options:
          - full      # 完整功能(约57MB)
          - minimal   # 精简功能(约48MB)
      enable_nss:
        description: '启用NSS硬件加速'
        required: true
        default: 'true'
        type: boolean
      enable_ipv6:
        description: '启用IPv6支持'
        required: true
        default: 'false'
        type: boolean
      upload_to_release:
        description: '发布到Releases'
        required: true
        default: 'true'
        type: boolean
      ssh_debug:
        description: '启用SSH远程调试'
        required: true
        default: 'false'
        type: boolean

  # 每周日凌晨2点自动编译精简版
  schedule:
    - cron: '0 18 * * 0'

  # 当工作流文件修改时自动编译
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-istore-ax1800pro.yml'

env:
  TZ: Asia/Shanghai
  CCACHE_SIZE: 2G
  KEEP_LATEST_RELEASES: 5
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      
    steps:
    - name: 初始化编译参数
      id: params
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          echo "branch=master" >> $GITHUB_OUTPUT
          echo "build_type=minimal" >> $GITHUB_OUTPUT
          echo "enable_nss=true" >> $GITHUB_OUTPUT
          echo "enable_ipv6=false" >> $GITHUB_OUTPUT
          echo "upload_to_release=true" >> $GITHUB_OUTPUT
        else
          echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
          echo "build_type=${{ inputs.build_type }}" >> $GITHUB_OUTPUT
          echo "enable_nss=${{ inputs.enable_nss }}" >> $GITHUB_OUTPUT
          echo "enable_ipv6=${{ inputs.enable_ipv6 }}" >> $GITHUB_OUTPUT
          echo "upload_to_release=${{ inputs.upload_to_release }}" >> $GITHUB_OUTPUT
        fi
        echo "FILE_DATE=$(date +"%Y%m%d-%H%M")" >> $GITHUB_OUTPUT

    - name: 检出Lean LEDE源码
      uses: actions/checkout@v5
      with:
        repository: coolsnowwolf/lede
        ref: ${{ steps.params.outputs.branch }}
        fetch-depth: 1

    - name: 安装编译依赖
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo docker system prune -a -f
        sudo apt update -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl python3-pip libelf-dev ccache device-tree-compiler u-boot-tools
        sudo apt autoremove --purge -y
        sudo apt clean
        sudo timedatectl set-timezone "$TZ"
        ccache -M $CCACHE_SIZE

    - name: 恢复ccache编译缓存
      uses: actions/cache@v4
      with:
        path: /home/runner/.ccache
        key: ${{ runner.os }}-ccache-istore-ax1800pro-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-ccache-istore-ax1800pro-

    - name: 添加软件源并修复webd错误
      run: |
        # 添加iStoreOS官方源
        echo "src-git istore https://github.com/istoreos/istore-packages.git;main" >> feeds.conf.default
        
        # 添加kenzok8源(如需科学上网等插件)
        echo "src-git kenzo https://github.com/kenzok8/openwrt-packages" >> feeds.conf.default
        echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default
        
        # 更新feeds
        ./scripts/feeds update -a
        
        # ==============================================
        # 关键修复：删除有问题的webd包
        # ==============================================
        rm -rf feeds/small/webd
        echo "✅ 已删除有问题的webd包"
        
        # 安装所有feeds
        ./scripts/feeds install -a

    - name: 生成设备配置文件
      run: |
        cat > .config << EOF
        # ==============================================
        # 京东云亚瑟AX1800 Pro (RE-SS-01) 基础配置
        # ==============================================
        CONFIG_TARGET_ipq60xx=y
        CONFIG_TARGET_ipq60xx_generic=y
        CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
        CONFIG_TARGET_IMAGES_GZIP=y
        CONFIG_TARGET_ROOTFS_SQUASHFS=y
        CONFIG_CCACHE=y
        CONFIG_STRIP_KERNEL_EXPORTS=y
        CONFIG_USE_MKLIBS=y
        CONFIG_TARGET_OPTIMIZATION="-O2 -pipe -march=armv8-a+crypto"
        CONFIG_DEBUG=n
        CONFIG_NO_STRIP=n

        # LuCI基础系统
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-mod-admin-full=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        CONFIG_PACKAGE_luci-theme-argon=y

        # iStoreOS核心组件
        CONFIG_PACKAGE_luci-app-istore=y
        CONFIG_PACKAGE_luci-app-istorex=y
        CONFIG_PACKAGE_luci-app-quickstart=y
        EOF

        # NSS硬件加速配置
        if [ "${{ steps.params.outputs.enable_nss }}" = "true" ]; then
          cat >> .config << EOF
        # 高通NSS硬件加速(性能提升10倍+)
        CONFIG_PACKAGE_kmod-qca-nss-drv=y
        CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
        CONFIG_PACKAGE_kmod-qca-nss-ecm=y
        CONFIG_PACKAGE_kmod-qca-nss-crypto=y
        CONFIG_PACKAGE_luci-app-turboacc=y
        EOF
        fi

        # IPv6支持配置
        if [ "${{ steps.params.outputs.enable_ipv6 }}" != "true" ]; then
          echo "# CONFIG_IPV6 is not set" >> .config
        fi

        # 完整功能包
        if [ "${{ steps.params.outputs.build_type }}" = "full" ]; then
          cat >> .config << EOF
        # Docker完整支持
        CONFIG_PACKAGE_luci-app-dockerman=y
        CONFIG_PACKAGE_kmod-docker=y
        CONFIG_PACKAGE_kmod-overlay=y
        CONFIG_PACKAGE_kmod-br-netfilter=y
        CONFIG_PACKAGE_kmod-ipt-extra=y
        CONFIG_PACKAGE_kmod-ipt-nat6=y
        CONFIG_PACKAGE_kmod-ipt-conntrack=y

        # 网络功能
        CONFIG_PACKAGE_luci-app-wireguard=y
        CONFIG_PACKAGE_kmod-wireguard=y
        CONFIG_PACKAGE_wireguard-tools=y
        CONFIG_PACKAGE_luci-proto-wireguard=y
        CONFIG_PACKAGE_luci-app-upnp=y
        CONFIG_PACKAGE_luci-app-ddns=y
        CONFIG_PACKAGE_luci-app-arpbind=y
        CONFIG_PACKAGE_luci-app-autoreboot=y
        CONFIG_PACKAGE_luci-app-nlbwmon=y
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_luci-app-wol=y
        CONFIG_PACKAGE_luci-app-samba4=y
        
        # 科学上网(可选，取消注释启用)
        # CONFIG_PACKAGE_luci-app-openclash=y
        # CONFIG_PACKAGE_luci-app-passwall=y
        EOF
        else
          # 精简功能包
          cat >> .config << EOF
        # 精简版仅保留基础功能
        CONFIG_PACKAGE_luci-app-ttyd=y
        CONFIG_PACKAGE_luci-app-nlbwmon=y
        EOF
        fi

        # 补全所有默认配置
        make defconfig

        # 验证设备配置
        if ! grep -q "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" .config; then
          echo "❌ 设备配置验证失败！"
          exit 1
        fi
        echo "✅ 设备配置验证通过"

    - name: 自定义固件设置
      run: |
        # 修改默认IP为192.168.1.1
        sed -i 's/192.168.1.1/192.168.1.1/g' package/base-files/files/bin/config_generate
        
        # 修改默认主机名
        sed -i 's/OpenWrt/JDCloud-AX1800-Pro/g' package/base-files/files/bin/config_generate
        
        # 修改默认时区为上海
        sed -i "s/'UTC'/'CST-8'\n        set system.@system[-1].zonename='Asia\/Shanghai'/g" package/base-files/files/bin/config_generate
        
        # NSS加速优化参数
        if [ "${{ steps.params.outputs.enable_nss }}" = "true" ]; then
          echo "net.core.rmem_max=16777216" >> package/base-files/files/etc/sysctl.conf
          echo "net.core.wmem_max=16777216" >> package/base-files/files/etc/sysctl.conf
        fi

    - name: SSH远程调试
      uses: P3TERX/ssh2actions@v1.0.0
      if: ${{ inputs.ssh_debug == 'true' && github.event_name == 'workflow_dispatch' }}
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 预下载源码包
      run: |
        make download -j8
        if [ $? -ne 0 ]; then
          echo "⚠️ 部分包下载失败，单线程重试..."
          make download -j1
        fi

    - name: 开始编译固件
      run: |
        echo "使用2线程编译(GitHub免费版最大配置)"
        make -j2 V=s
        
        if [ $? -ne 0 ]; then
          echo "❌ 编译失败！显示最后200行日志"
          tail -n 200 build_dir/target-*/linux-ipq60xx_generic/linux-*/.config
          exit 1
        fi

    - name: 整理并验证固件
      id: organize
      run: |
        mkdir -p output
        
        # 查找固件文件
        FACTORY_BIN=$(find bin/targets/ipq60xx/generic/ -name "*jdcloud_re-ss-01*squashfs-factory.bin")
        SYSUPGRADE_BIN=$(find bin/targets/ipq60xx/generic/ -name "*jdcloud_re-ss-01*squashfs-sysupgrade.bin")
        
        if [ -z "$FACTORY_BIN" ] || [ -z "$SYSUPGRADE_BIN" ]; then
          echo "❌ 未找到生成的固件文件！"
          find bin/ -name "*.bin"
          exit 1
        fi
        
        # 重命名固件
        PREFIX="Lean-iStoreOS-JDCloud-AX1800Pro-${{ steps.params.outputs.build_type }}-${{ steps.params.outputs.FILE_DATE }}"
        cp "$FACTORY_BIN" "output/${PREFIX}_factory.bin"
        cp "$SYSUPGRADE_BIN" "output/${PREFIX}_sysupgrade.bin"
        
        # 生成说明文件
        cat > output/README.txt << EOF
        京东云亚瑟AX1800 Pro (RE-SS-01) Lean LEDE + iStoreOS 固件
        ==================================================
        编译时间: $(date '+%Y-%m-%d %H:%M:%S')
        源码分支: Lean LEDE ${{ steps.params.outputs.branch }}
        编译类型: ${{ steps.params.outputs.build_type }}
        NSS加速: ${{ steps.params.outputs.enable_nss }}
        IPv6支持: ${{ steps.params.outputs.enable_ipv6 }}
        
        文件说明:
        - *_factory.bin: 从u-boot界面首次刷入使用
        - *_sysupgrade.bin: OpenWrt系统内升级使用
        
        默认信息:
        - 管理地址: http://192.168.1.1
        - 用户名: root
        - 密码: password
        
        已集成功能:
        - iStoreOS应用商店(可一键安装插件)
        - Argon主题
        - 网页终端
        - 带宽监控
        EOF
        
        if [ "${{ steps.params.outputs.enable_nss }}" = "true" ]; then
          echo "- 高通NSS硬件加速(NAT转发可达千兆)" >> output/README.txt
        fi
        
        if [ "${{ steps.params.outputs.build_type }}" = "full" ]; then
          echo "- Docker容器管理" >> output/README.txt
          echo "- WireGuard VPN" >> output/README.txt
          echo "- Samba文件共享" >> output/README.txt
        fi
        
        # 显示固件大小
        echo "✅ 编译成功！固件信息:"
        ls -lh output/*.bin
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 上传固件到Artifacts
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success'
      with:
        name: ${{ steps.params.outputs.build_type }}-istore-ax1800pro-${{ steps.params.outputs.FILE_DATE }}
        path: output/
        retention-days: 90

    - name: 删除旧Releases
      uses: dev-drprasad/delete-older-releases@v0.3.4
      if: ${{ steps.params.outputs.upload_to_release == 'true' && steps.organize.outputs.status == 'success' }}
      with:
        keep_latest: ${{ env.KEEP_LATEST_RELEASES }}
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 发布到GitHub Releases
      uses: softprops/action-gh-release@v2
      if: ${{ steps.params.outputs.upload_to_release == 'true' && steps.organize.outputs.status == 'success' }}
      with:
        tag_name: istore-${{ steps.params.outputs.build_type }}-${{ steps.params.outputs.FILE_DATE }}
        name: 京东云AX1800 Pro iStoreOS ${{ steps.params.outputs.build_type }} ${{ steps.params.outputs.FILE_DATE }}
        body_path: output/README.txt
        files: output/*.bin
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
