name: 京东云亚瑟AX1800 Pro LEDE编译（USB网卡+短信）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 系统初始化与依赖安装
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt update -y || true
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl libelf-dev device-tree-compiler u-boot-tools bc pciutils lm-sensors || true
          
          for cmd in git make gcc g++ flex bison; do
            if ! command -v $cmd &> /dev/null; then
              echo "❌ 关键依赖 $cmd 安装失败"
              exit 1
            fi
          done
          
          git config --global http.timeout 300
          git config --global http.postBuffer 524288000
          git config --global core.askpass ""
          git config --global credential.helper "store --file=/dev/null"

      - name: 克隆Lean LEDE源码
        run: |
          for i in 1 2 3 4 5; do
            echo "第$i次尝试克隆Lean源码..."
            git clone --depth 1 https://github.com/coolsnowwolf/lede.git -b ${{ inputs.branch }} lede && break
            rm -rf lede
            sleep 15
          done
          
          if [ ! -d "lede" ]; then
            echo "❌ Lean源码克隆失败"
            exit 1
          fi
          echo "✅ Lean源码克隆成功"

      - name: 添加短信工具源并更新feeds
        working-directory: ./lede
        run: |
          echo "src-git smstool https://github.com/dwj0/luci-app-sms-tool.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "✅ 所有feeds安装完成"

      - name: 检测京东云亚瑟真实设备名
        working-directory: ./lede
        id: device_detect
        run: |
          echo "🔍 正在扫描 ipq60xx 平台设备列表..."
          grep -r "define Device/" target/linux/ipq60xx/image/ | grep -i jdcloud || true
          
          DEVICE_LINE=$(grep -r "define Device/" target/linux/ipq60xx/image/ | grep -i jdcloud | head -1)
          if [ -z "$DEVICE_LINE" ]; then
            echo "❌ 未找到任何 jdcloud 设备定义，请检查 Lean 源码是否支持该设备"
            exit 1
          fi
          
          DEVICE_NAME=$(echo "$DEVICE_LINE" | sed -n 's/.*define Device\/\([^ ]*\).*/\1/p')
          echo "✅ 检测到设备名: $DEVICE_NAME"
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_OUTPUT

      - name: 生成配置（动态设备名）
        working-directory: ./lede
        run: |
          DEVICE_NAME="${{ steps.device_detect.outputs.DEVICE_NAME }}"
          
          # 1. 生成默认配置
          make defconfig
          
          # 2. 完全清除原有 TARGET 配置，写入正确的设备三行
          sed -i '/^CONFIG_TARGET_/d' .config
          cat >> .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_${DEVICE_NAME}=y
          EOF
          
          # 3. 基于该设备生成完整默认配置
          make defconfig
          
          # 4. 追加所需软件包
          cat >> .config << EOF
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          
          # USB 网卡支持（中兴F50）
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-ether=y
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_usb-modeswitch=y
          
          # 短信功能（ModemManager + smstool）
          CONFIG_PACKAGE_modemmanager=y
          CONFIG_PACKAGE_luci-proto-modemmanager=y
          CONFIG_PACKAGE_luci-app-sms-tool=y
          EOF
          
          # 5. 最后一次 defconfig 补全所有新依赖
          make defconfig
          
          # 6. 验证设备配置是否保留
          if grep -q "CONFIG_TARGET_ipq60xx_generic_DEVICE_${DEVICE_NAME}=y" .config; then
            echo "✅ 设备配置验证通过 (${DEVICE_NAME})"
          else
            echo "❌ 设备配置再次丢失，当前设备项："
            grep -E 'CONFIG_TARGET_.*DEVICE' .config || echo "无设备定义"
            exit 1
          fi

      - name: 预下载源码包
        working-directory: ./lede
        run: |
          make download -j8 || make download -j4 || make download -j1
          echo "✅ 所有源码包下载完成"

      - name: 编译固件
        working-directory: ./lede
        run: |
          make -j2 V=s
          
          DEVICE_NAME="${{ steps.device_detect.outputs.DEVICE_NAME }}"
          if ls bin/targets/ipq60xx/generic/*${DEVICE_NAME}*squashfs*.bin 1> /dev/null 2>&1; then
            echo "✅ 固件编译成功"
          else
            echo "❌ 固件编译失败"
            exit 1
          fi

      - name: 提取并重命名固件
        run: |
          DEVICE_NAME="${{ steps.device_detect.outputs.DEVICE_NAME }}"
          mkdir -p output
          DATE=$(date +"%Y%m%d-%H%M")
          
          cp lede/bin/targets/ipq60xx/generic/*${DEVICE_NAME}*squashfs-factory.bin output/LEDE-AX1800Pro-${DATE}_factory.bin
          cp lede/bin/targets/ipq60xx/generic/*${DEVICE_NAME}*squashfs-sysupgrade.bin output/LEDE-AX1800Pro-${DATE}_sysupgrade.bin
          
          echo "✅ 编译完成！生成的固件："
          ls -lh output/

      - name: 发布到GitHub Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ax1800pro-${{ github.run_number }}
          name: 京东云AX1800 Pro LEDE固件 ${{ github.run_number }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
