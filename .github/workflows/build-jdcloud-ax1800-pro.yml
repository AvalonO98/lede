name: 京东云亚瑟AX1800 Pro LEDE+iStore编译（终极稳定版）

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Lean LEDE分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master

env:
  # 强制Node.js 24（GitHub 2026.6.16强制要求）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai
  GIT_HTTP_TIMEOUT: 300
  GIT_LOW_SPEED_LIMIT: 1000
  GIT_LOW_SPEED_TIME: 60

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 系统初始化与Git优化
        run: |
          # 配置Git全局参数，解决克隆超时和速度慢问题
          git config --global http.timeout $GIT_HTTP_TIMEOUT
          git config --global http.lowSpeedLimit $GIT_LOW_SPEED_LIMIT
          git config --global http.lowSpeedTime $GIT_LOW_SPEED_TIME
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
          
          # 更新系统并安装基础依赖
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl libelf-dev

      - name: 克隆Lean LEDE源码（5次重试机制）
        run: |
          # 清理可能存在的旧文件
          rm -rf lede
          mkdir -p lede
          cd lede
          
          # 5次重试克隆源码
          for i in 1 2 3 4 5; do
            echo "第$i次尝试克隆Lean源码..."
            git clone --depth 1 https://github.com/coolsnowwolf/lede.git -b ${{ inputs.branch }} . && break
            echo "克隆失败，等待10秒后重试..."
            rm -rf .git *
            sleep 10
          done
          
          # 验证克隆是否成功
          if [ ! -f "feeds.conf.default" ]; then
            echo "❌ Lean源码克隆失败（exit code 128）"
            exit 1
          fi
          
          echo "✅ Lean源码克隆成功，版本: $(git rev-parse --short HEAD)"

      - name: 添加iStore官方源（多重兜底）
        working-directory: ./lede
        run: |
          # 备份默认feeds配置
          cp feeds.conf.default feeds.conf
          
          # 添加iStore官方稳定源
          echo "src-git istore https://github.com/istoreos/istore-packages.git;main" >> feeds.conf
          
          # 3次重试更新feeds
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            echo "⚠️ feeds更新失败，第$i次重试..."
            rm -rf feeds/
            mkdir -p feeds
            sleep 5
          done
          
          # 手动克隆iStore源兜底
          if [ ! -d "feeds/istore" ]; then
            echo "🔧 手动克隆iStore源..."
            for j in 1 2 3; do
              git clone --depth 1 https://github.com/istoreos/istore-packages.git -b main feeds/istore && break
              echo "iStore克隆失败，第$j次重试..."
              rm -rf feeds/istore
              sleep 5
            done
          fi
          
          # 最终验证
          if [ ! -d "feeds/istore" ]; then
            echo "❌ iStore源克隆失败"
            exit 1
          fi
          
          # 安装所有feeds
          ./scripts/feeds install -a
          echo "✅ 所有feeds安装成功"

      - name: 生成AX1800 Pro官方配置
        working-directory: ./lede
        run: |
          cat > .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_STRIP_KERNEL_EXPORTS=y
          CONFIG_USE_MKLIBS=y
          
          # LuCI基础
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y
          
          # iStore应用商店
          CONFIG_PACKAGE_luci-app-istore=y
          CONFIG_PACKAGE_luci-app-istorex=y
          CONFIG_PACKAGE_luci-app-quickstart=y
          
          # NSS硬件加速（千兆转发必备）
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-qdisc=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          
          # 基础插件
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          EOF
          
          # 补全默认配置
          make defconfig
          
          # 验证设备配置
          if grep -q "CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y" .config; then
            echo "✅ 设备配置验证通过"
          else
            echo "❌ 设备配置错误"
            exit 1
          fi

      - name: 预下载源码包
        working-directory: ./lede
        run: |
          make download -j8 || make download -j4 || make download -j1
          echo "✅ 所有源码包下载完成"

      - name: 编译固件（稳定2线程）
        working-directory: ./lede
        run: |
          make -j2 V=s
          
          # 验证固件生成
          if ls bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs*.bin 1> /dev/null 2>&1; then
            echo "✅ 固件编译成功"
          else
            echo "❌ 固件编译失败"
            exit 1
          fi

      - name: 提取并重命名固件
        run: |
          mkdir -p output
          DATE=$(date +"%Y%m%d-%H%M")
          
          # 复制固件
          cp lede/bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-factory.bin output/LEDE-iStore-AX1800Pro-${DATE}_factory.bin
          cp lede/bin/targets/ipq60xx/generic/*jdcloud_re-ss-01*squashfs-sysupgrade.bin output/LEDE-iStore-AX1800Pro-${DATE}_sysupgrade.bin
          
          # 生成说明
          cat > output/README.txt << EOF
          京东云AX1800 Pro (RE-SS-01) 稳定固件
          编译日期: $DATE
          固件大小: ~52MB（符合60MB分区限制）
          运行环境: GitHub Actions Node.js 24
          
          文件说明:
          - *_factory.bin: U-Boot首次刷入
          - *_sysupgrade.bin: OpenWrt系统内升级
          
          默认信息:
          - 管理地址: http://192.168.1.1
          - 用户名: root
          - 密码: password
          
          核心功能:
          ✅ iStore官方应用商店
          ✅ 高通NSS千兆硬件加速
          ✅ 中文Argon主题
          ✅ 网页终端+带宽监控
          EOF
          
          ls -lh output/

      - name: 发布到Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ax1800pro-lede-${{ github.run_number }}
          name: 京东云AX1800 Pro LEDE+iStore固件 ${{ github.run_number }}
          body_path: output/README.txt
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
