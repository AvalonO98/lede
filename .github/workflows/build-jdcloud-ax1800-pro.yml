name: 编译京东云亚瑟AX1800 Pro LEDE固件

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '编译分支'
        required: true
        default: 'master'
        type: choice
        options:
          - master
      build_type:
        description: '编译类型'
        required: true
        default: 'minimal'
        type: choice
        options:
          - full
          - minimal

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 确定编译参数
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "branch=master" >> $GITHUB_OUTPUT
            echo "build_type=full" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ inputs.branch }}" >> $GITHUB_OUTPUT
            echo "build_type=${{ inputs.build_type }}" >> $GITHUB_OUTPUT
          fi

      - name: 检出 Lean LEDE 源码
        uses: actions/checkout@v4
        with:
          repository: coolsnowwolf/lede
          ref: ${{ steps.params.outputs.branch }}
          fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget curl python3-pip libelf-dev ccache

      - name: 清理冲突第三方源（彻底修复 small 源报错）
        run: |
          rm -rf feeds/
          mkdir -p feeds
          true

      - name: 只添加官方源 + iStore 源（无报错）
        run: |
          echo "src-git istore https://github.com/istoreos/istore-packages.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置文件（京东云亚瑟 AX1800 Pro RE-SS-01）
        run: |
          cat > .config << EOF
          CONFIG_TARGET_ipq60xx=y
          CONFIG_TARGET_ipq60xx_generic=y
          CONFIG_TARGET_ipq60xx_generic_DEVICE_jdcloud_re-ss-01=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_CCACHE=y

          # LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-admin-full=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-theme-argon=y

          # iStore
          CONFIG_PACKAGE_luci-app-istore=y
          CONFIG_PACKAGE_luci-app-istorex=y

          # NSS 加速
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_luci-app-turboacc=y

          # 基础插件
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          EOF

          make defconfig

      - name: 预下载包
        run: |
          make download -j8 || make download -j1

      - name: 开始编译（2线程稳定不报错）
        run: |
          make -j2 V=s

      - name: 检查固件
        run: |
          mkdir -p output
          find bin/targets/ipq60xx/generic/ -name "*jdcloud*squashfs*.bin" -exec cp {} output/ \;
          ls -lh output/

      - name: 上传固件
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: jdcloud-ax1800pro-${{ github.run_number }}
          name: 京东云亚瑟 AX1800 Pro 固件
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
